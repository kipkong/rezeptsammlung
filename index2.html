<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezeptsammlung</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #f4f6f4;
    --warm-brown: #2d4a35;
    --terracotta: #4a7c59;
    --sage: #6a9478;
    --gold: #8aab8f;
    --dark: #1a2e1f;
    --light-brown: #dce8df;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    font-family: 'Lato', sans-serif;
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background-color: var(--warm-brown);
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.03) 20px,
      rgba(255,255,255,0.03) 40px
    );
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    color: var(--cream);
    letter-spacing: 0.02em;
    position: relative;
  }
  header h1 span {
    color: var(--cream);
    font-style: normal;
  }
  .header-line {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 0.8rem auto;
    position: relative;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin-bottom: 2rem;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.5rem;
    border: 2px solid var(--light-brown);
    border-radius: 2px;
    background: white;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    color: var(--dark);
    transition: border-color 0.2s;
  }
  .search-box input:focus { outline: none; border-color: var(--terracotta); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
  }
  select {
    padding: 0.75rem 1rem;
    border: 2px solid var(--light-brown);
    border-radius: 2px;
    background: white;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select:focus { outline: none; border-color: var(--terracotta); }

  .btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 2px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .btn-primary {
    background: var(--terracotta);
    color: white;
  }
  .btn-primary:hover { background: #b5633f; }
  .btn-secondary {
    background: var(--sage);
    color: white;
  }
  .btn-secondary:hover { background: #6a7c5e; }
  .btn-outline {
    background: transparent;
    color: var(--warm-brown);
    border: 2px solid var(--warm-brown);
  }
  .btn-outline:hover { background: var(--warm-brown); color: white; }

  /* CATEGORY PILLS */
  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .pill {
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .pill.active { background: var(--warm-brown); color: white; border-color: var(--warm-brown); }
  .pill:not(.active) { background: white; color: var(--warm-brown); border-color: var(--light-brown); }
  .pill:not(.active):hover { border-color: var(--warm-brown); }

  /* REZEPT GRID */
  .rezept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .rezept-card {
    background: white;
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .rezept-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    background: var(--light-brown);
  }
  .card-img-placeholder {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, var(--light-brown) 0%, #d4c5b2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .card-body {
    padding: 1.2rem;
  }
  .card-kategorie {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 0.4rem;
  }
  .card-titel {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--dark);
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }
  .card-meta {
    font-size: 0.82rem;
    color: #888;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 0.3rem; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    grid-column: 1 / -1;
  }
  .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
  .empty h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--warm-brown); margin-bottom: 0.5rem; }
  .empty p { color: #888; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    overflow-y: auto;
    padding: 2rem 1rem;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--cream);
    border-radius: 4px;
    width: 100%;
    max-width: 700px;
    overflow: hidden;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    background: var(--warm-brown);
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 {
    font-family: 'Playfair Display', serif;
    color: var(--cream);
    font-size: 1.5rem;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--cream);
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .modal-close:hover { opacity: 1; }
  .modal-body { padding: 2rem; }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--warm-brown);
  }
  input[type="text"], input[type="file"], textarea, select.form-select {
    padding: 0.65rem 0.9rem;
    border: 2px solid var(--light-brown);
    border-radius: 2px;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    color: var(--dark);
    background: white;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, textarea:focus, select.form-select:focus { outline: none; border-color: var(--terracotta); }
  textarea { resize: vertical; min-height: 100px; }
  .form-actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.5rem;
    justify-content: flex-end;
  }

  /* DETAIL VIEW */
  .detail-bild {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    background: var(--light-brown);
    display: block;
  }
  .detail-body { padding: 2rem; }
  .detail-kategorie {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 0.5rem;
  }
  .detail-titel {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--dark);
    margin-bottom: 1rem;
    line-height: 1.2;
  }
  .detail-meta {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 1rem 0;
    border-top: 1px solid var(--light-brown);
    border-bottom: 1px solid var(--light-brown);
    margin-bottom: 1.5rem;
  }
  .detail-meta-item { font-size: 0.9rem; }
  .detail-meta-item strong { color: var(--warm-brown); display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .detail-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--warm-brown);
    margin-bottom: 0.8rem;
  }
  .zutaten-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .zutat-tag {
    background: var(--light-brown);
    color: var(--warm-brown);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.85rem;
  }
  .detail-notizen {
    background: white;
    padding: 1rem;
    border-left: 4px solid var(--gold);
    font-size: 0.95rem;
    line-height: 1.7;
    color: #555;
  }
  .detail-actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 1.5rem;
  }

  /* STATUS */
  .status {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--dark);
    color: white;
    padding: 0.8rem 1.5rem;
    border-radius: 4px;
    font-size: 0.9rem;
    display: none;
    animation: fadeIn 0.3s ease;
    z-index: 2000;
  }
  .status.show { display: block; }
  .status.error { background: #c0392b; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* LOADING */
  .loading { text-align: center; padding: 3rem; grid-column: 1/-1; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--light-brown);
    border-top-color: var(--terracotta);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .count-badge {
    background: var(--light-brown);
    color: var(--warm-brown);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    margin-left: 0.5rem;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 2rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .toolbar { flex-direction: column; }
    .search-box { width: 100%; }
  }

  /* LOGIN */
  #loginScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--warm-brown);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }
  #loginScreen.show { display: flex; }
  .login-box {
    background: var(--cream);
    padding: 2.5rem;
    border-radius: 4px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--dark);
    margin-bottom: 0.3rem;
  }
  .login-box p {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .login-box .form-group { margin-bottom: 1rem; }
  .login-error {
    background: #f5ddd9;
    color: #8b2222;
    padding: 0.7rem 1rem;
    border-radius: 2px;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .login-error.show { display: block; }

  /* USER BADGE in header */
  .header-user {
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .header-user span {
    color: var(--light-brown);
    font-size: 0.8rem;
  }
  .btn-logout {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<!-- API KEY SETUP -->
<div id="apiKeyScreen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9998;align-items:center;justify-content:center">
  <div class="login-box">
    <h2>KI einrichten</h2>
    <p>Einmalig: Anthropic API Key eingeben. Er wird nur auf diesem Gerät gespeichert und nie hochgeladen.</p>
    <div class="login-error" id="apiKeyError"></div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="speichereApiKey()">Speichern</button>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="show">
  <div class="login-box">
    <h2>Rezeptsammlung</h2>
    <p>Bitte einloggen</p>
    <div class="login-error" id="loginError"></div>
    <div class="form-group">
      <label>E-Mail</label>
      <input type="text" id="loginEmail" placeholder="deine@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="loginPasswort" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="login()">Einloggen</button>
  </div>
</div>

<header>
  <h1><span>Rezeptsammlung</span></h1>
  <div class="header-line"></div>
  <div class="header-user">
    <span id="userEmail"></span>
    <button class="btn-logout" onclick="zeigeApiKeyDialog()" title="API Key ändern">🔑</button>
    <button class="btn-logout" onclick="logout()">Abmelden</button>
  </div>
</header>

<div class="container">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Suche nach Rezept, Zutat, Koch…" oninput="filterRezepte()">
    </div>
    <select id="quelleFilter" onchange="filterRezepte()">
      <option value="">Alle Quellen</option>
    </select>
    <select id="kochFilter" onchange="filterRezepte()">
      <option value="">Alle Köche</option>
    </select>
    <button class="btn btn-primary" onclick="openAddModal()">+ Rezept hinzufügen</button>
  </div>

  <!-- Kategorien -->
  <div class="categories" id="kategorienPills"></div>

  <!-- Grid -->
  <div class="rezept-grid" id="rezeptGrid">
    <div class="loading"><div class="spinner"></div><p>Rezepte werden geladen…</p></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Neues Rezept</h2>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Titel *</label>
          <input type="text" id="f_titel" placeholder="z.B. Spaghetti Carbonara">
        </div>
        <div class="form-group">
          <label>Kategorie</label>
          <select class="form-select" id="f_kategorie">
            <option value="">– wählen –</option>
            <option>Hauptgericht</option>
            <option>Suppe</option>
            <option>Beilage</option>
            <option>Ofen</option>
            <option>Salat</option>
            <option>Vorspeise</option>
            <option>Dessert</option>
            <option>Frühstück</option>
            <option>Backen</option>
            <option>Getränk</option>
            <option>Snack</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quelle (Magazin / Buch)</label>
          <input type="text" id="f_quelle" placeholder="z.B. Lust auf Genuss">
        </div>
        <div class="form-group">
          <label>Koch / Autorin</label>
          <input type="text" id="f_koch" placeholder="z.B. Jamie Oliver">
        </div>
        <div class="form-group">
          <label>Zutaten (kommagetrennt)</label>
          <input type="text" id="f_zutaten" placeholder="z.B. Pasta, Ei, Speck, Parmesan">
        </div>
        <div class="form-group full">
          <label>Zubereitung / Notizen</label>
          <textarea id="f_notizen" placeholder="Vollständige Zubereitung, Schritt für Schritt…" style="min-height:150px"></textarea>
        </div>
        <div class="form-group full">
          <label>Fotos / Scans hochladen (mehrere Seiten möglich)</label>
          <div style="display:flex;gap:0.8rem;align-items:flex-start;flex-wrap:wrap">
            <div style="flex:1;min-width:200px">
              <input type="file" id="f_bild" accept="image/*" multiple onchange="zeigeVorschau(this)">
              <small style="color:#888;font-size:0.8rem;margin-top:0.3rem;display:block">Mehrere Dateien auswählen möglich – alle Seiten eines Rezepts</small>
            </div>
            <button class="btn btn-secondary" onclick="leseRezeptAus()" id="btnAuslesen" style="white-space:nowrap;margin-top:0.1rem">
              ✨ KI auslesen
            </button>
          </div>
          <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.7rem;cursor:pointer;font-size:0.88rem;font-weight:normal;text-transform:none;letter-spacing:0;color:var(--dark)">
            <input type="checkbox" id="f_loescheBild" style="width:16px;height:16px;accent-color:var(--terracotta)">
            Foto nur zum Auslesen verwenden – danach nicht speichern
          </label>
          <div id="bildVorschau" style="display:none;margin-top:0.8rem;display:flex;flex-wrap:wrap;gap:0.5rem"></div>
          <div id="auslesenStatus" style="display:none;margin-top:0.8rem;padding:0.8rem;background:var(--light-brown);border-radius:2px;font-size:0.88rem;color:var(--dark)"></div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-outline" onclick="closeModal('addModal')">Abbrechen</button>
        <button class="btn btn-primary" onclick="saveRezept()">Speichern</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Rezept</h2>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<div class="status" id="statusMsg"></div>

<script>
const SUPABASE_URL = 'https://kvilloqhgtrxxikjzybu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2aWxsb3FoZ3RyeHhpa2p6eWJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzI0NzAsImV4cCI6MjA5NDMwODQ3MH0.i59yt2onimIDFbbXXFFl24eKYq1jEaYP542VwW2xHfM';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const KATEGORIEN = ['Alle', 'Hauptgericht', 'Suppe', 'Beilage', 'Ofen', 'Salat', 'Vorspeise', 'Dessert', 'Frühstück', 'Backen', 'Getränk', 'Snack'];
const KATEGORIE_ICONS = { 'Hauptgericht':'🍽️', 'Suppe':'🍲', 'Beilage':'🥗', 'Ofen':'🫕', 'Salat':'🥙', 'Vorspeise':'🫒', 'Dessert':'🍮', 'Frühstück':'🥐', 'Backen':'🥧', 'Getränk':'🥂', 'Snack':'🫙' };

const ANTHROPIC_KEY = null; // wird vom Benutzer eingegeben und lokal gespeichert

let alleRezepte = [];
let aktiveKategorie = 'Alle';
let editId = null;

// API KEY
function getApiKey() {
  return localStorage.getItem('anthropic_api_key');
}

function speichereApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    document.getElementById('apiKeyError').textContent = 'Ungültiger Key – muss mit sk-ant- beginnen';
    document.getElementById('apiKeyError').classList.add('show');
    return;
  }
  localStorage.setItem('anthropic_api_key', key);
  document.getElementById('apiKeyScreen').style.display = 'none';
}

function zeigeApiKeyDialog() {
  document.getElementById('apiKeyScreen').style.display = 'flex';
  document.getElementById('apiKeyInput').value = getApiKey() || '';
}

// AUTH
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const passwort = document.getElementById('loginPasswort').value;
  const errorEl = document.getElementById('loginError');
  errorEl.classList.remove('show');

  const { data, error } = await db.auth.signInWithPassword({ email, password: passwort });
  if (error) {
    errorEl.textContent = 'Falsche E-Mail oder Passwort.';
    errorEl.classList.add('show');
    return;
  }
  zeigeApp(data.user);
}

async function logout() {
  await db.auth.signOut();
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('userEmail').textContent = '';
}

function zeigeApp(user) {
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('userEmail').textContent = user.email;
}

// Enter-Taste beim Login
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginPasswort').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
});

// INIT
window.addEventListener('DOMContentLoaded', async () => {
  // Prüfen ob bereits eingeloggt
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    zeigeApp(session.user);
    renderKategorien();
    await ladeRezepte();
  } else {
    document.getElementById('loginScreen').classList.add('show');
    // Warten bis Login erfolgt
    db.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        zeigeApp(session.user);
        renderKategorien();
        await ladeRezepte();
      }
    });
  }
});

async function ladeRezepte() {
  const { data, error } = await db.from('rezepte').select('*').order('created_at', { ascending: false });
  if (error) { showStatus('Fehler beim Laden: ' + error.message, true); return; }
  alleRezepte = data || [];
  befuelleFilter();
  filterRezepte();
}

function renderKategorien() {
  const container = document.getElementById('kategorienPills');
  container.innerHTML = KATEGORIEN.map(k => `
    <span class="pill ${k === aktiveKategorie ? 'active' : ''}" onclick="setKategorie('${k}')">${k === 'Alle' ? '✨ Alle' : (KATEGORIE_ICONS[k] || '') + ' ' + k}</span>
  `).join('');
}

function setKategorie(k) {
  aktiveKategorie = k;
  renderKategorien();
  filterRezepte();
}

function befuelleFilter() {
  const quellen = [...new Set(alleRezepte.map(r => r.quelle).filter(Boolean))].sort();
  const koeche = [...new Set(alleRezepte.map(r => r.koch).filter(Boolean))].sort();
  const qSel = document.getElementById('quelleFilter');
  const kSel = document.getElementById('kochFilter');
  const qVal = qSel.value; const kVal = kSel.value;
  qSel.innerHTML = '<option value="">Alle Quellen</option>' + quellen.map(q => `<option ${q===qVal?'selected':''}>${q}</option>`).join('');
  kSel.innerHTML = '<option value="">Alle Köche</option>' + koeche.map(k => `<option ${k===kVal?'selected':''}>${k}</option>`).join('');
}

function filterRezepte() {
  const suche = document.getElementById('searchInput').value.toLowerCase();
  const quelle = document.getElementById('quelleFilter').value;
  const koch = document.getElementById('kochFilter').value;

  let gefiltert = alleRezepte.filter(r => {
    const matchKat = aktiveKategorie === 'Alle' || r.kategorie === aktiveKategorie;
    const matchQuelle = !quelle || r.quelle === quelle;
    const matchKoch = !koch || r.koch === koch;
    const matchSuche = !suche || [r.titel, r.zutaten, r.quelle, r.koch, r.notizen].some(f => f && f.toLowerCase().includes(suche));
    return matchKat && matchQuelle && matchKoch && matchSuche;
  });

  renderGrid(gefiltert);
}

function renderGrid(rezepte) {
  const grid = document.getElementById('rezeptGrid');
  if (rezepte.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><h3>Keine Rezepte gefunden</h3><p>Probiere andere Suchbegriffe oder füge ein neues Rezept hinzu.</p></div>`;
    return;
  }
  grid.innerHTML = rezepte.map(r => {
    const bilder = r.bilder_urls ? JSON.parse(r.bilder_urls) : (r.bild_url ? [r.bild_url] : []);
    const ersteBild = bilder[0];
    const mehrSeiten = bilder.length > 1 ? `<div style="position:absolute;top:0.5rem;right:0.5rem;background:rgba(0,0,0,0.55);color:white;font-size:0.75rem;padding:0.2rem 0.5rem;border-radius:20px">${bilder.length} Seiten</div>` : '';
    const bildHtml = ersteBild
      ? `<div style="position:relative"><img class="card-img" src="${ersteBild}" alt="${r.titel}" onerror="this.parentElement.style.display='none'">${mehrSeiten}</div>`
      : `<div class="card-img-placeholder">${KATEGORIE_ICONS[r.kategorie] || '🍴'}</div>`;
    return `
      <div class="rezept-card" onclick="openDetail(${r.id})">
        ${bildHtml}
        <div class="card-body">
          <div class="card-kategorie">${r.kategorie || 'Ohne Kategorie'}</div>
          <div class="card-titel">${r.titel}</div>
          <div class="card-meta">
            ${r.quelle ? `<span>📖 ${r.quelle}</span>` : ''}
            ${r.koch ? `<span>👨‍🍳 ${r.koch}</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// DETAIL
function openDetail(id) {
  const r = alleRezepte.find(x => x.id === id);
  if (!r) return;
  const zutatenArr = r.zutaten ? r.zutaten.split(',').map(z => z.trim()).filter(Boolean) : [];
  const bilder = r.bilder_urls ? JSON.parse(r.bilder_urls) : (r.bild_url ? [r.bild_url] : []);

  let bilderHtml = '';
  if (bilder.length === 1) {
    bilderHtml = `<img class="detail-bild" src="${bilder[0]}" alt="${r.titel}">`;
  } else if (bilder.length > 1) {
    bilderHtml = `
      <div style="position:relative;background:#111">
        <img class="detail-bild" id="sliderImg" src="${bilder[0]}" alt="${r.titel}" style="max-height:420px">
        <div style="position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:0.8rem;padding:0.8rem;background:linear-gradient(transparent,rgba(0,0,0,0.6))">
          <button onclick="sliderNav(-1,${id})" style="background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem">‹</button>
          <span id="sliderCount" style="color:white;font-size:0.85rem">1 / ${bilder.length}</span>
          <button onclick="sliderNav(1,${id})" style="background:rgba(255,255,255,0.2);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem">›</button>
        </div>
      </div>`;
  }

  document.getElementById('detailContent').innerHTML = `
    ${bilderHtml}
    <div class="detail-body">
      <div class="detail-kategorie">${r.kategorie || ''}</div>
      <div class="detail-titel">${r.titel}</div>
      <div class="detail-meta">
        ${r.quelle ? `<div class="detail-meta-item"><strong>Quelle</strong>${r.quelle}</div>` : ''}
        ${r.koch ? `<div class="detail-meta-item"><strong>Koch</strong>${r.koch}</div>` : ''}
      </div>
      ${zutatenArr.length ? `
        <div class="detail-section">
          <h3>Zutaten</h3>
          <ul class="zutaten-list">${zutatenArr.map(z => `<li class="zutat-tag">${z}</li>`).join('')}</ul>
        </div>` : ''}
      ${r.notizen ? `
        <div class="detail-section">
          <h3>Zubereitung</h3>
          <div class="detail-notizen">${r.notizen.replace(/\n/g,'<br>')}</div>
        </div>` : ''}
      <div class="detail-actions">
        <button class="btn btn-outline" onclick="openEdit(${r.id})">✏️ Bearbeiten</button>
        <button class="btn btn-secondary" style="background:#5a3535" onclick="loescheRezept(${r.id})">🗑️ Löschen</button>
      </div>
    </div>`;
  document.getElementById('detailModal').classList.add('open');
}

let sliderIndex = 0;
function sliderNav(dir, id) {
  const r = alleRezepte.find(x => x.id === id);
  const bilder = r.bilder_urls ? JSON.parse(r.bilder_urls) : [];
  sliderIndex = (sliderIndex + dir + bilder.length) % bilder.length;
  document.getElementById('sliderImg').src = bilder[sliderIndex];
  document.getElementById('sliderCount').textContent = `${sliderIndex + 1} / ${bilder.length}`;
}

// ADD
function openAddModal() {
  editId = null;
  sliderIndex = 0;
  document.getElementById('modalTitle').textContent = 'Neues Rezept';
  ['titel','quelle','koch','zutaten','notizen'].forEach(f => document.getElementById('f_'+f).value = '');
  document.getElementById('f_kategorie').value = '';
  document.getElementById('f_bild').value = '';
  document.getElementById('f_loescheBild').checked = false;
  document.getElementById('bildVorschau').innerHTML = '';
  document.getElementById('bildVorschau').style.display = 'none';
  document.getElementById('auslesenStatus').style.display = 'none';
  document.getElementById('addModal').classList.add('open');
}

function openEdit(id) {
  const r = alleRezepte.find(x => x.id === id);
  if (!r) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Rezept bearbeiten';
  document.getElementById('f_titel').value = r.titel || '';
  document.getElementById('f_kategorie').value = r.kategorie || '';
  document.getElementById('f_quelle').value = r.quelle || '';
  document.getElementById('f_koch').value = r.koch || '';
  document.getElementById('f_zutaten').value = r.zutaten || '';
  document.getElementById('f_notizen').value = r.notizen || '';
  closeModal('detailModal');
  document.getElementById('addModal').classList.add('open');
}

function zeigeVorschau(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const vorschau = document.getElementById('bildVorschau');
  vorschau.innerHTML = '';
  vorschau.style.display = 'flex';
  files.forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative';
      wrap.innerHTML = `
        <img src="${e.target.result}" style="height:100px;width:80px;object-fit:cover;border-radius:2px;border:2px solid var(--light-brown)">
        <span style="position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.5);color:white;font-size:0.7rem;padding:1px 4px;border-radius:2px">Seite ${i+1}</span>`;
      vorschau.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
}

async function leseRezeptAus() {
  const files = Array.from(document.getElementById('f_bild').files);
  if (!files.length) { showStatus('Bitte zuerst Fotos auswählen', true); return; }

  const apiKey = getApiKey();
  if (!apiKey) { zeigeApiKeyDialog(); return; }

  const btn = document.getElementById('btnAuslesen');
  const statusEl = document.getElementById('auslesenStatus');
  btn.textContent = '⏳ Wird ausgelesen…';
  btn.disabled = true;
  statusEl.style.display = 'block';
  statusEl.style.background = 'var(--light-brown)';
  statusEl.textContent = `KI analysiert ${files.length} Seite(n)…`;

  try {
    // Alle Bilder zu base64 – mit Komprimierung auf max 4MB
    const bildBlocks = await Promise.all(files.map(file => new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        // Maximale Breite 1600px
        if (w > 1600) { h = Math.round(h * 1600 / w); w = 1600; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // Qualität reduzieren bis unter 4MB
        let quality = 0.85;
        let data;
        do {
          data = canvas.toDataURL('image/jpeg', quality);
          quality -= 0.1;
        } while (data.length * 0.75 > 4 * 1024 * 1024 && quality > 0.2);
        URL.revokeObjectURL(url);
        resolve({
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: data.split(',')[1] }
        });
      };
      img.onerror = reject;
      img.src = url;
    })));

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            ...bildBlocks,
            {
              type: 'text',
              text: `Dies sind ${files.length} Seite(n) desselben Rezepts. Lies den gesamten Text vollständig aus – nichts weglassen oder kürzen. Antworte NUR mit einem JSON-Objekt, kein weiterer Text, keine Backticks:
{
  "titel": "Name des Rezepts",
  "kategorie": "eine von: Hauptgericht, Suppe, Beilage, Ofen, Salat, Vorspeise, Dessert, Frühstück, Backen, Getränk, Snack",
  "zutaten": "vollständige Zutatenliste mit genauen Mengenangaben, kommagetrennt, z.B. '200g Mehl, 3 Eier, 1 TL Salz'",
  "quelle": "Name des Magazins, Buchs oder Webseite falls erkennbar, sonst leer",
  "koch": "Name des Kochs oder Autors falls erkennbar, sonst leer",
  "notizen": "die VOLLSTÄNDIGE Zubereitung exakt wie abgedruckt, Schritt für Schritt, mit allen Details, Temperaturen, Zeiten und Hinweisen – nichts kürzen"
}`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API Fehler');

    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const rezept = JSON.parse(clean);

    if (rezept.titel) document.getElementById('f_titel').value = rezept.titel;
    if (rezept.kategorie) document.getElementById('f_kategorie').value = rezept.kategorie;
    if (rezept.zutaten) document.getElementById('f_zutaten').value = rezept.zutaten;
    if (rezept.quelle) document.getElementById('f_quelle').value = rezept.quelle;
    if (rezept.koch) document.getElementById('f_koch').value = rezept.koch;
    if (rezept.notizen) document.getElementById('f_notizen').value = rezept.notizen;

    statusEl.textContent = '✓ Felder wurden automatisch ausgefüllt – bitte kurz prüfen und ggf. korrigieren.';
    statusEl.style.background = '#d4eadb';

  } catch (err) {
    statusEl.textContent = 'Fehler beim Auslesen: ' + err.message;
    statusEl.style.background = '#f5ddd9';
  } finally {
    btn.textContent = '✨ KI auslesen';
    btn.disabled = false;
  }
}

async function saveRezept() {
  const titel = document.getElementById('f_titel').value.trim();
  if (!titel) { showStatus('Bitte einen Titel eingeben', true); return; }

  const payload = {
    titel,
    kategorie: document.getElementById('f_kategorie').value,
    quelle: document.getElementById('f_quelle').value.trim(),
    koch: document.getElementById('f_koch').value.trim(),
    zutaten: document.getElementById('f_zutaten').value.trim(),
    notizen: document.getElementById('f_notizen').value.trim(),
  };

  // Mehrere Bilder hochladen – nur wenn Checkbox nicht gesetzt
  const bildFiles = Array.from(document.getElementById('f_bild').files);
  const nurAuslesen = document.getElementById('f_loescheBild').checked;
  if (bildFiles.length > 0 && !nurAuslesen) {
    showStatus('Bilder werden hochgeladen…');
    const urls = [];
    for (const file of bildFiles) {
      const ext = file.name.split('.').pop();
      const pfad = `rezepte/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const { error: uploadErr } = await db.storage.from('bilder').upload(pfad, file, { upsert: true });
      if (uploadErr) { showStatus('Bild-Upload fehlgeschlagen: ' + uploadErr.message, true); return; }
      const { data: urlData } = db.storage.from('bilder').getPublicUrl(pfad);
      urls.push(urlData.publicUrl);
    }
    payload.bilder_urls = JSON.stringify(urls);
    payload.bild_url = urls[0]; // Rückwärtskompatibilität
  }

  let error;
  if (editId) {
    ({ error } = await db.from('rezepte').update(payload).eq('id', editId));
  } else {
    ({ error } = await db.from('rezepte').insert(payload));
  }

  if (error) { showStatus('Fehler: ' + error.message, true); return; }

  showStatus(editId ? 'Rezept aktualisiert! ✓' : 'Rezept gespeichert! ✓');
  closeModal('addModal');
  await ladeRezepte();
}

async function loescheRezept(id) {
  if (!confirm('Rezept wirklich löschen?')) return;
  const { error } = await db.from('rezepte').delete().eq('id', id);
  if (error) { showStatus('Fehler beim Löschen', true); return; }
  showStatus('Rezept gelöscht');
  closeModal('detailModal');
  await ladeRezepte();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function showStatus(msg, isError = false) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status show' + (isError ? ' error' : '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});
</script>
